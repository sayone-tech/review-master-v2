{% extends "auth_base.html" %}
{% block title %}Check your email · Review Master{% endblock %}

{% block card %}
  <div class="w-12 h-12 rounded-full bg-green-tint text-green flex items-center justify-center mx-auto mb-4">
    <span class="w-6 h-6" aria-hidden="true" data-lucide="mail-check"></span>
  </div>
  <h1 class="text-[20px] font-semibold text-ink mb-2 text-center">Check your email</h1>
  <p class="text-sm text-subtle text-center mb-6">If an account exists for that email address, you'll receive a password reset link within a few minutes.</p>
  <a href="{% url 'login' %}" class="block text-center text-[13px] text-blue hover:underline">Back to sign in</a>
{% endblock %}
