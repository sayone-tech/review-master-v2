services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reviewmaster
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "app"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/"]
      interval: 10s
      timeout: 3s
      retries: 3

  vite:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && mkdir -p ../static/css && npm run css:build && npm run css:watch & npm run dev -- --host 0.0.0.0"
    volumes:
      - .:/app
      - vite_node_modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173/static/dist/@vite/client"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "uv sync --frozen && python manage.py migrate --run-syncdb && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DJANGO_SECRET_KEY: dev-insecure-secret
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,web
      DJANGO_VITE_DEV_MODE: "True"
      DATABASE_URL: postgres://app:app@db:5432/reviewmaster
      REDIS_URL: redis://redis:6379
      DEFAULT_FROM_EMAIL: noreply@example.com
      DEFAULT_REPLY_TO: support@example.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      vite:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - web_venv:/app/.venv

volumes:
  postgres_data:
  vite_node_modules:
  web_venv:
